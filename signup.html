<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Blog System</title>
</head>
<body>
<div>
    <div>
        <h1>Create Account</h1>
        <p>Register to start writing and managing your own blogs.</p>

        <form th:action="@{/signup}" th:object="${user}" method="post">
            <div>
                <label for="fullName">Full Name</label>
                <input id="fullName" type="text" th:field="*{fullName}" placeholder="Enter full name">
                <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </div>

            <div>
                <label for="username">Username</label>
                <input id="username" type="text" th:field="*{username}" placeholder="Choose username">
                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
            </div>

            <div>
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" placeholder="Enter email">
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div>
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}" placeholder="Create password">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>

            <div>
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="Confirm password">
                <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Create Account</button>
        </form>

        <p>
            Already registered?
            <a th:href="@{/login}">Login here</a>
        </p>
    </div>
</div>
</body>
</html>
