<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Blog System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 380px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        p {
            text-align: center;
            color: #555;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Create Account</h1>
    <p>Register to start writing your blogs</p>

    <form th:action="@{/signup}" th:object="${user}" method="post">

        <label>Full Name</label>
        <input type="text" th:field="*{fullName}" placeholder="Enter full name">
        <p class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>

        <label>Username</label>
        <input type="text" th:field="*{username}" placeholder="Choose username">
        <p class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>

        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="Enter email">
        <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

        <label>Password</label>
        <input type="password" th:field="*{password}" placeholder="Create password">
        <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

        <label>Confirm Password</label>
        <input type="password" th:field="*{confirmPassword}" placeholder="Confirm password">
        <p class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <button type="submit">Create Account</button>
    </form>

    <div class="link">
        <p>Already registered?</p>
        <a th:href="@{/login}">Login here</a>
    </div>
</div>

</body>
</html>
