<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Blog System</title>
</head>
<body>
<div>
    <header>
        <div>
            <p>Dashboard</p>
            <h1 th:text="'Welcome, ' + ${currentUser.fullName}">Welcome</h1>
            <p>Create blogs and store them in the database.</p>
        </div>
        <div>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">Logout</button>
            </form>
        </div>
    </header>

    <div th:if="${successMessage}" th:text="${successMessage}"></div>

    <section>
        <div>
            <h3>Create Blog</h3>
            <p>Simple form for adding a new blog post.</p>
        </div>

        <form th:action="@{/blogs}" th:object="${blog}" method="post">
            <div>
                <label for="title">Title</label>
                <input id="title" type="text" th:field="*{title}" placeholder="Enter blog title">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>

            <div>
                <label for="content">Content</label>
                <textarea id="content" th:field="*{content}" placeholder="Write your blog content"></textarea>
                <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Save Blog</button>
        </form>
    </section>

    <section>
        <div>
            <h3>Your Blogs</h3>
            <p th:text="'Username: ' + ${currentUser.username} + ' | Email: ' + ${currentUser.email}">User details</p>
        </div>

        <div th:if="${#lists.isEmpty(blogs)}">
            No blogs found for this user.
        </div>

        <div th:unless="${#lists.isEmpty(blogs)}">
            <article th:each="blog : ${blogs}">
                <div>
                    <h4 th:text="${blog.title}">Title</h4>
                    <p>
                        Created:
                        <span th:text="${#temporals.format(blog.createdAt, 'dd MMM yyyy HH:mm')}">date</span>
                        |
                        Updated:
                        <span th:text="${#temporals.format(blog.updatedAt, 'dd MMM yyyy HH:mm')}">date</span>
                    </p>
                    <p th:text="${#strings.abbreviate(blog.content, 220)}">Preview</p>
                </div>
                <div>
                    <form th:action="@{'/blogs/' + ${blog.id} + '/delete'}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" onclick="return confirm('Delete this blog?')">Delete</button>
                    </form>
                </div>
            </article>
        </div>
    </section>
</div>
</body>
</html>
