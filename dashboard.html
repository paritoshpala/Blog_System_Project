<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Blog System</title>

    <!-- Simple Styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        header {
            display: flex;
            justify-content: space-between;
            background: #333;
            color: white;
            padding: 15px;
        }
        section {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        button {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .error {
            color: red;
            font-size: 14px;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        article {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
    </style>
</head>

<body>

<header>
    <div>
        <h2>Dashboard</h2>
        <h3 th:text="'Welcome, ' + ${currentUser.fullName}">Welcome</h3>
    </div>

    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Logout</button>
    </form>
</header>

<!-- Success Message -->
<div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>

<!-- Create Blog -->
<section>
    <h3>Create Blog</h3>

    <form th:action="@{/blogs}" th:object="${blog}" method="post">

        <label>Title</label>
        <input type="text" th:field="*{title}" placeholder="Enter blog title">
        <p class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

        <label>Content</label>
        <textarea th:field="*{content}" placeholder="Write your blog content"></textarea>
        <p class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Save Blog</button>
    </form>
</section>

<!-- Blog List -->
<section>
    <h3>Your Blogs</h3>

    <p>
        Username: <span th:text="${currentUser.username}"></span> |
        Email: <span th:text="${currentUser.email}"></span>
    </p>

    <div th:if="${#lists.isEmpty(blogs)}">
        <p>No blogs found.</p>
    </div>

    <div th:unless="${#lists.isEmpty(blogs)}">
        <article th:each="blog : ${blogs}">
            <h4 th:text="${blog.title}">Title</h4>

            <p>
                Created:
                <span th:text="${#temporals.format(blog.createdAt, 'dd MMM yyyy HH:mm')}"></span>
                |
                Updated:
                <span th:text="${#temporals.format(blog.updatedAt, 'dd MMM yyyy HH:mm')}"></span>
            </p>

            <p th:text="${#strings.abbreviate(blog.content, 150)}"></p>

            <form th:action="@{'/blogs/' + ${blog.id} + '/delete'}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" onclick="return confirm('Delete this blog?')">
                    Delete
                </button>
            </form>
        </article>
    </div>
</section>

</body>
</html>
