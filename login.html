<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Blog System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        p {
            text-align: center;
            color: #555;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .msg {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .error { color: red; }
        .success { color: green; }
        .link {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Login</h1>
    <p>Access your dashboard and manage your blogs</p>

    <!-- Messages -->
    <div th:if="${param.error}" class="msg error">
        Invalid username or password
    </div>

    <div th:if="${param.logout}" class="msg success">
        Logged out successfully
    </div>

    <div th:if="${registered}" class="msg success">
        Registration successful. Please login.
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <label>
            <input type="checkbox" name="remember-me"> Remember me
        </label>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <button type="submit">Login</button>
    </form>

    <div class="link">
        <p>Don't have an account?</p>
        <a th:href="@{/signup}">Sign up here</a>
    </div>
</div>

</body>
</html>
